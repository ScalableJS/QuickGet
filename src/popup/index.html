<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickGet Remote</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="container">
      <!-- Toolbar rendered by Toolbar.svelte (mounted in toolbar/index.ts) -->
      <header class="toolbar"></header>

      <main>
        <input type="file" id="torrentFileInput" accept=".torrent" hidden />

        <div class="status-bar">
          <section id="status" class="status-pill" role="status" aria-live="polite">
            <p id="status-message" class="status-message"></p>
          </section>
          
        </div>

        <!-- Filter bar + task listbox rendered by DownloadsList.svelte (mounted in downloads/downloadsUI.ts) -->
        <section id="downloads-section" class="downloads-section"></section>

        <!-- Settings form rendered by Settings.svelte (mounted in settings/index.ts) -->
        <section id="settings-panel" class="settings-panel hidden"></section>

        <!-- Batch URL form rendered by CreateUrls.svelte (mounted in upload/index.ts) -->
        <section id="add-urls-panel" class="settings-panel hidden"></section>

        <!-- Unlock screen rendered by Unlock.svelte (mounted in unlock/index.ts) -->
        <section id="unlock-panel" class="settings-panel hidden"></section>
      </main>

      <footer>
        <p>QuickGet Remote v2.9.0 • <a href="https://github.com/ScalableJS/QuickGet" target="_blank" rel="noopener noreferrer">GitHub</a></p>
      </footer>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
