<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickGet Remote</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="container">
      <!-- Toolbar rendered by Toolbar.svelte (mounted in toolbar/index.ts) -->
      <header class="toolbar"></header>

      <main>
        <input type="file" id="torrentFileInput" accept=".torrent" hidden />

        <div class="status-bar">
          <section id="status" class="status-pill" role="status" aria-live="polite">
            <p id="status-message" class="status-message"></p>
          </section>
          
        </div>

        <section id="downloads-section" class="downloads-section">
          <div
            id="downloads-list"
            role="listbox"
            aria-label="Download tasks"
            aria-multiselectable="false"
          ></div>
        </section>

        <!-- Settings form rendered by Settings.svelte (mounted in settings/index.ts) -->
        <section id="settings-panel" class="settings-panel hidden"></section>

        <details class="debug-section hidden">
          <summary>Debug Logs</summary>
          <div id="debug-logs"></div>
          <button type="button" id="copy-logs-btn" class="btn btn-small">Copy Logs</button>
          <button type="button" id="clear-logs-btn" class="btn btn-small">Clear Logs</button>
        </details>
      </main>

      <footer>
        <p>QuickGet Remote v0.0.1 beta • <a href="#">GitHub</a></p>
      </footer>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
