<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickGet Remote</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="container">
      <header class="toolbar">
        <div class="toolbar-left">
          <button
            type="button"
            id="toolbar-settings"
            class="toolbar-btn"
            title="Toggle settings"
            aria-label="Toggle settings"
            aria-controls="settings-panel"
            aria-expanded="false"
            aria-pressed="false"
          >
            ⚙
          </button>
          <span id="status-speed" class="status-speed" aria-live="off">↓ 0 B/s ↑ 0 B/s</span>
        </div>
        <div class="toolbar-actions">
          <button type="button" id="toolbar-play" class="toolbar-btn" title="Refresh downloads" aria-label="Refresh downloads">
            ▶
          </button>
          <button type="button" id="toolbar-stop" class="toolbar-btn" title="Stop auto-refresh" aria-label="Stop auto-refresh">
            ■
          </button>
          <button type="button" id="toolbar-pause" class="toolbar-btn" title="Pause auto-refresh" aria-label="Pause auto-refresh">
            ⏸
          </button>
          <button type="button" id="toolbar-add" class="toolbar-btn" title="Add torrent" aria-label="Add torrent">
            ＋
          </button>
          <button type="button" id="toolbar-remove" class="toolbar-btn" title="Remove selected download" aria-label="Remove selected download" disabled>
            −
          </button>
        </div>
      </header>

      <main>
        <input type="file" id="torrentFileInput" accept=".torrent" hidden />

        <div class="status-bar">
          <section id="status" class="status-pill" role="status" aria-live="polite">
            <p id="status-message" class="status-message"></p>
          </section>
          
        </div>

        <section id="downloads-section" class="downloads-section">
          <div
            id="downloads-list"
            role="listbox"
            aria-label="Download tasks"
            aria-multiselectable="false"
          ></div>
        </section>

        <!-- Settings form rendered by Settings.svelte (mounted in settings/index.ts) -->
        <section id="settings-panel" class="settings-panel hidden"></section>

        <details class="debug-section hidden">
          <summary>Debug Logs</summary>
          <div id="debug-logs"></div>
          <button type="button" id="copy-logs-btn" class="btn btn-small">Copy Logs</button>
          <button type="button" id="clear-logs-btn" class="btn btn-small">Clear Logs</button>
        </details>
      </main>

      <footer>
        <p>QuickGet Remote v0.0.1 beta • <a href="#">GitHub</a></p>
      </footer>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
